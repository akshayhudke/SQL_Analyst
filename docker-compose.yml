version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sqluser
      POSTGRES_PASSWORD: sqlpass
      POSTGRES_DB: sqllab
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://sqluser:sqlpass@db:5432/sqllab
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:7b
      ANALYZE_STATEMENT_TIMEOUT_MS: 8000
      PREVIEW_LIMIT: 100
      MEMORY_PATH: /app/data/memory.jsonl
      SEED_MEMORY_PATH: /app/data/seed_examples.jsonl
      TRAINING_STORE_ENABLED: "true"
      LLM_ONLY_REWRITE: "true"
      MEMORY_REWRITE_ENABLED: "false"
      LLM_TIMEOUT_LIVE: "45"
      LLM_TIMEOUT_MANUAL: "120"
      LLM_MAX_PREDICT_LIVE: "400"
      LLM_MAX_PREDICT_MANUAL: "900"
      LLM_MAX_FINDINGS_LIVE: "6"
      LLM_MAX_FINDINGS_MANUAL: "12"
      LLM_MAX_INDEX_LIVE: "6"
      LLM_MAX_INDEX_MANUAL: "12"
      LLM_MAX_MEMORY_LIVE: "1"
      LLM_MAX_MEMORY_MANUAL: "3"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - db
      - ollama
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
  ollama:
