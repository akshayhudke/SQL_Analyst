version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: sqluser
      POSTGRES_PASSWORD: sqlpass
      POSTGRES_DB: sqllab
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"

  ollama:
    image: ollama/ollama:latest
    cpus: 2.0
    mem_limit: 4g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://sqluser:sqlpass@db:5432/sqllab
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      OLLAMA_MODEL_LIVE: qwen2.5:1.5b
      OLLAMA_MODEL_MANUAL: qwen2.5:1.5b
      OLLAMA_MODEL_FALLBACKS: qwen2.5:1.5b
      ANALYZE_STATEMENT_TIMEOUT_MS: 8000
      PREVIEW_LIMIT: 100
      MEMORY_PATH: /app/data/memory.jsonl
      SEED_MEMORY_PATH: /app/data/seed_examples.jsonl
      TRAINING_STORE_ENABLED: "true"
      LLM_ONLY_REWRITE: "true"
      RULE_FALLBACK_REWRITE: "true"
      MEMORY_REWRITE_ENABLED: "false"
      LLM_LIVE_ENABLED: "false"
      LLM_TIMEOUT_LIVE: "20"
      LLM_TIMEOUT_MANUAL: "30"
      LLM_MAX_PREDICT_LIVE: "180"
      LLM_MAX_PREDICT_MANUAL: "180"
      LLM_NUM_CTX_LIVE: "1024"
      LLM_NUM_CTX_MANUAL: "1024"
      LLM_TEMPERATURE: "0.1"
      LLM_TOP_P: "0.9"
      LLM_STREAM: "true"
      LLM_KEEP_ALIVE: "5m"
      LLM_CACHE_TTL_SECONDS: "180"
      LLM_LOCK_WAIT_SECONDS: "3"
      LLM_SKIP_IF_BUSY_LIVE: "true"
      LLM_MAX_FINDINGS_LIVE: "6"
      LLM_MAX_FINDINGS_MANUAL: "12"
      LLM_MAX_INDEX_LIVE: "6"
      LLM_MAX_INDEX_MANUAL: "12"
      LLM_MAX_MEMORY_LIVE: "1"
      LLM_MAX_MEMORY_MANUAL: "3"
      LLM_LIVE_MAX_SQL_CHARS: "1200"
      LLM_COOLDOWN_SECONDS: "25"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - db
      - ollama
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
  ollama:
